name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate repo structure and version consistency
        run: npm run validate
      - name: Run grader unit tests
        run: npm run unit-tests
